spring.application.name=node
# ===================================================================
# 1. IDENTITY AND NETWORK CONFIGURATION OF THE CURRENT NODE (NODE 3)
# ===================================================================
# Unique identifier of this node in the P2P cluster (project plan: Node 3 = Java)
node.id=3

# IP address assigned to the Windows machine (change to the actual local network IP)
node.ip=192.168.1.7

# Port where the embedded Tomcat server listens for HTTP REST requests
server.port=8083

# UDP port where this server listens (UdpConfig) and where peers send heartbeats
udp.port=4444


# ===================================================================
# 2. PEER NETWORK ADDRESSES FOR REPLICATION AND THE BULLY ALGORITHM
# ===================================================================
# Node 1: Linux / C# .NET environment
peers.node1.ip=192.168.1.40
peers.node1.url=http://192.168.1.40:8081

# Node 2: macOS / Python FastAPI environment
peers.node2.ip=192.168.1.7
peers.node2.url=http://192.168.1.7:8082


# ===================================================================
# 3. LOGGING
# ===================================================================
# Console log formatting for readability, including timestamp and thread name
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Application package log level. DEBUG shows UDP packets and network transactions in the console
logging.level.com.example.node=DEBUG

# Silence the default, very detailed Spring framework logs
logging.level.org.springframework=INFO
logging.level.org.springframework.integration=WARN


# ===================================================================
# 4. ADDITIONAL SPRING BOOT SETTINGS
# ===================================================================
# Disable the Spring Boot startup banner to keep the test console readable
spring.main.banner-mode=off

# Allow bean definition overriding, useful for integration tests and mocking
spring.main.allow-bean-definition-overriding=true
